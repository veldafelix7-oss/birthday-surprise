<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #f7c6da, #fce9f3);
  overflow-x: hidden;
  width: 100%;
}

.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px 20px;
  max-width: 500px;
  margin: auto;
}

.ribbon.left { top: 20px; left: 10px; }
.ribbon.right { bottom: 40px; right: 20px; }

.flower {
  position: absolute;
  width: 260px;
  right: -40px;
  top: 40%;
  transform: translateY(-50%);
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
  animation: floatSlow 8s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

@keyframes floatSlow {
  0%,100% { transform: translateY(-50%); }
  50% { transform: translateY(-60%); }
}

/* SECTIONS */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 30px;
  position: relative;
  z-index: 2;
}

/* TEXT STYLE */
.hero-title {
  font-family: 'Great Vibes', cursive;
  font-size: 42px;
  color: #8c3a5c;
  line-height: 1.2;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  margin-top: 15px;
  color: #6a3d50;
  max-width: 420px;
}

.form-area {
  margin-top: 40px;
  max-width: 320px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 14px;
  border-radius: 30px;
  border: 1px solid #e6a7c0;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(6px);
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 18px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(90deg, #e48ab2, #d06793);
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

.link-box {
  margin-top: 15px;
  font-size: 12px;
  word-break: break-all;
  color: #5c3345;
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: sparkle 3s infinite ease-in-out;
}

@keyframes sparkle {
  0%,100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
}

</style>
</head>

<body>

<img src="https://i.imgur.com/0XKzn2L.png" class="ribbon left">
<img src="https://i.imgur.com/0XKzn2L.png" class="ribbon right">
<img src="https://i.imgur.com/1F6XG5L.png" class="flower">

<div class="sparkle" style="top:20%; left:30%;"></div>
<div class="sparkle" style="top:60%; left:70%;"></div>

<div id="app"></div>

<script>
window.addEventListener("load", async function () {

  const supabaseUrl = "https://eqqohpkcshygvakvnvre.supabase.co";
  const supabaseKey = "sb_publishable_7qiliYzeUqJE5IMiMO2luQ_4utxTjxL";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const app = document.getElementById("app");

  if (!id) {

    app.innerHTML = `
      <div class="section">
        <div class="hero-title">A Special Birthday Page</div>
        <div class="subtitle">
          Buat halaman ulang tahun pribadi yang hanya bisa diakses dengan password.
          Sebuah kejutan kecil yang penuh makna.
        </div>

        <div class="form-area">
          <input id="nama" placeholder="Nama yang berulang tahun">
          <input id="password" placeholder="Password">
          <button id="btn">Buat Link Surprise</button>
          <div id="hasil" class="link-box"></div>
        </div>
      </div>
    `;

    document.getElementById("btn").onclick = async function () {
      const nama = document.getElementById("nama").value.trim();
      const password = document.getElementById("password").value.trim();

      const { data } = await supabase
        .from("webHBD")
        .insert([{ nama: nama, password: password }])
        .select();

      const newId = data[0].id;
      const link = window.location.origin + "?id=" + newId;

      document.getElementById("hasil").innerHTML =
        "Link:<br><a href='" + link + "'>" + link + "</a>";
    };

  } else {

    const { data } = await supabase
      .from("webHBD")
      .select("*")
      .eq("id", id)
      .single();

    app.innerHTML = `
      <div class="section">
        <div class="hero-title">Selamat Ulang Tahun, ${data.nama}</div>
        <div class="subtitle">
          Hari ini adalah bab baru dalam perjalanan hidupmu.
          Semoga segala harapan dan rencana yang kamu simpan
          perlahan menjadi nyata dan membawa kebahagiaan.
        </div>
      </div>
    `;
  }

});
</script>

</body>
</html>
