<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  font-family: Arial;
  background: #ffd6e7;
  padding: 20px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  margin: auto;
}
input, button {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
}
button {
  background: #ff69b4;
  color: white;
  border: none;
}
</style>
</head>
<body>

<div id="app"></div>

<script>
const supabaseUrl = "https://eqqohpkcshygvakvnvre.supabase.co";
const supabaseKey = "sb_publishable_7qiliYzeUqJE5IMiMO2luQ_4utxTjxL";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const app = document.getElementById("app");

if (!id) {
  app.innerHTML = `
    <div class="card">
      <h3>Buat Link Surprise</h3>
      <input id="nama" placeholder="Nama yang ulang tahun">
      <input id="password" placeholder="Password">
      <button onclick="buatLink()">Buat Link</button>
      <p id="hasil"></p>
    </div>
  `;
}

async function buatLink() {
  const nama = document.getElementById("nama").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase
    .from("webHBD")
    .insert([{ nama: nama, password: password }])
    .select();

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  const newId = data[0].id;
  const link = window.location.origin + "?id=" + newId;

  document.getElementById("hasil").innerHTML =
    "Link: <br><a href='" + link + "'>" + link + "</a>";
}

if (id) {
  loadData();
}

async function loadData() {
  const { data, error } = await supabase
    .from("webHBD")
    .select("*")
    .eq("id", id)
    .single();

  if (!data) {
    app.innerHTML = "<div class='card'>Link tidak ditemukan</div>";
    return;
  }

  app.innerHTML = `
    <div class="card">
      <h3>Masukkan Password</h3>
      <input id="pw">
      <button onclick="cek('${data.password}','${data.nama}')">Masuk</button>
    </div>
  `;
}

function cek(password, nama) {
  const pw = document.getElementById("pw").value;
  if (pw === password) {
    app.innerHTML = `
      <div class="card">
        <h2>Selamat Ulang Tahun, ${nama}</h2>
        <p>Semoga panjang umur, sehat selalu, dan semua impianmu tercapai.</p>
      </div>
    `;
  } else {
    alert("Password salah");
  }
}
</script>

</body>
</html>
