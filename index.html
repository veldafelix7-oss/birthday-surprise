<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f6c1d8, #f9e3ee);
  min-height: 100vh;
  overflow-x: hidden;
}

.background-layer {
  position: fixed;
  width: 600px;
  height: 600px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  top: -200px;
  right: -200px;
}

.background-layer2 {
  position: fixed;
  width: 500px;
  height: 500px;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
  bottom: -150px;
  left: -150px;
}

.wrapper {
  position: relative;
  z-index: 2;
  padding: 40px 20px;
  max-width: 500px;
  margin: auto;
}

.section {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  border-radius: 18px;
  padding: 30px;
  margin-bottom: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.05);
}

h1 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.6;
  color: #444;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #e8b8cc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 18px;
  border-radius: 10px;
  border: none;
  background: #e28db0;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

.link-box {
  margin-top: 15px;
  font-size: 12px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="background-layer"></div>
<div class="background-layer2"></div>

<div class="wrapper" id="app"></div>

<script>
window.addEventListener("load", async function () {

  const supabaseUrl = "https://eqqohpkcshygvakvnvre.supabase.co";
  const supabaseKey = "sb_publishable_7qiliYzeUqJE5IMiMO2luQ_4utxTjxL";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const app = document.getElementById("app");

  if (!id) {

    app.innerHTML = `
      <div class="section">
        <h1>Birthday Link Creator</h1>
        <p>
          Buat halaman ulang tahun pribadi yang hanya bisa dibuka dengan password.
          Halaman ini akan menampilkan ucapan khusus yang disesuaikan dengan nama penerima.
        </p>
      </div>

      <div class="section">
        <input id="nama" placeholder="Nama yang berulang tahun">
        <input id="password" placeholder="Password untuk membuka halaman">
        <button id="btn">Buat Link Surprise</button>
        <div id="hasil" class="link-box"></div>
      </div>
    `;

    document.getElementById("btn").onclick = async function () {

      const nama = document.getElementById("nama").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!nama || !password) {
        alert("Semua field harus diisi.");
        return;
      }

      const { data, error } = await supabase
        .from("webHBD")
        .insert([{ nama: nama, password: password }])
        .select();

      if (error) {
        alert("Terjadi kesalahan.");
        return;
      }

      const newId = data[0].id;
      const link = window.location.origin + "?id=" + newId;

      document.getElementById("hasil").innerHTML =
        "Link berhasil dibuat:<br><a href='" + link + "'>" + link + "</a>";
    };

  } else {

    const { data } = await supabase
      .from("webHBD")
      .select("*")
      .eq("id", id)
      .single();

    if (!data) {
      app.innerHTML = "<div class='section'>Link tidak ditemukan.</div>";
      return;
    }

    app.innerHTML = `
      <div class="section">
        <h1>Akses Halaman Ulang Tahun</h1>
        <p>Masukkan password yang telah dibuat untuk membuka halaman khusus ini.</p>
        <input id="pw" placeholder="Password">
        <button id="cekbtn">Masuk</button>
      </div>
    `;

    document.getElementById("cekbtn").onclick = function () {

      const pw = document.getElementById("pw").value.trim();

      if (pw === data.password) {

        app.innerHTML = `
          <div class="section">
            <h1>Selamat Ulang Tahun, ${data.nama}</h1>
            <p>
              Hari ini adalah awal dari satu tahun baru dalam perjalanan hidupmu.
              Semoga setiap langkah yang kamu ambil membawa kedamaian, keberhasilan,
              dan kebahagiaan yang terus bertambah.
            </p>
            <p>
              Teruslah tumbuh menjadi versi terbaik dari dirimu sendiri.
              Semoga semua rencana yang sedang kamu bangun perlahan menjadi nyata.
            </p>
          </div>
        `;

      } else {
        alert("Password salah.");
      }
    };
  }

});
</script>

</body>
</html>
