<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:
linear-gradient(rgba(248,201,221,0.85), rgba(253,234,243,0.9)),
url('https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg?auto=compress&cs=tinysrgb&w=1200');
background-size: cover;
background-position: center;
background-attachment: fixed;
overflow-x:hidden;
}

/* WRAPPER */
.wrapper{
max-width:480px;
margin:auto;
padding:50px 25px;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
}

.decor{
position:absolute;
width:220px;
height:220px;
border-radius:50%;
filter:blur(60px);
opacity:0.35;
z-index:0;
}

.decor-top{
top:-80px;
right:-80px;
background:#f5a9c6;
}

.decor-bottom{
bottom:-80px;
left:-80px;
background:#e48ab2;
}

.decor-top{
top:-80px;
right:-80px;
background:#f5a9c6;
}

.decor-bottom{
bottom:-80px;
left:-80px;
background:#e48ab2;
}

.flower-img{
position:absolute;
width:220px;
opacity:0.5;
pointer-events:none;
animation:floatFlower 8s ease-in-out infinite;
}

.flower-left{
bottom:0;
left:-40px;
}

.flower-right{
top:20%;
right:-40px;
}

@keyframes floatFlower{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

/* TEXT */
.title{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:600;
color:#8a3c5d;
margin-bottom:15px;
line-height:1.3;
}

.subtitle{
font-size:14px;
line-height:1.6;
color:#5c3a4a;
margin-bottom:35px;
}

/* FORM */
input{
width:100%;
padding:13px;
border-radius:30px;
border:1px solid #e6b3c7;
background:rgba(255,255,255,0.6);
font-size:14px;
margin-bottom:15px;
}

button{
width:100%;
padding:13px;
border-radius:30px;
border:none;
background:linear-gradient(90deg,#e48ab2,#cf5c8e);
color:white;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.link-box{
margin-top:15px;
font-size:12px;
word-break:break-all;
color:#6a3d50;
}

.fade-in{
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div id="app"></div>

<script>
window.addEventListener("load", async function(){

const supabaseUrl="https://eqqohpkcshygvakvnvre.supabase.co";
const supabaseKey="sb_publishable_7qiliYzeUqJE5IMiMO2luQ_4utxTjxL";
const supabase=window.supabase.createClient(supabaseUrl,supabaseKey);

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

const app=document.getElementById("app");

if(!id){

app.innerHTML=`
<div class="wrapper fade-in">
<div class="decor decor-top"></div>
<div class="decor decor-bottom"></div>


<div class="title">Create a Personal Birthday Page</div>
<div class="subtitle">
Buat halaman ulang tahun pribadi yang hanya bisa diakses dengan password.
Sebuah kejutan sederhana dengan sentuhan romantis.
</div>

<input id="nama" placeholder="Nama yang berulang tahun">
<input id="password" placeholder="Password untuk membuka halaman">
<button id="btn">Buat Link Surprise</button>

<div id="hasil" class="link-box"></div>
</div>
`;

document.getElementById("btn").onclick=async function(){

const nama=document.getElementById("nama").value.trim();
const password=document.getElementById("password").value.trim();

if(!nama||!password){
alert("Semua field harus diisi.");
return;
}

const {data,error}=await supabase
.from("webHBD")
.insert([{nama:nama,password:password}])
.select();

if(error){
alert("Terjadi kesalahan.");
return;
}

const newId=data[0].id;
const link=window.location.origin+"?id="+newId;

document.getElementById("hasil").innerHTML=
"Link berhasil dibuat:<br><a href='"+link+"'>"+link+"</a>";

};

}else{

const {data}=await supabase
.from("webHBD")
.select("*")
.eq("id",id)
.single();

app.innerHTML=`
<div class="wrapper fade-in">


<div class="title">Selamat Ulang Tahun, ${data.nama}</div>

<div class="subtitle">
Hari ini adalah awal dari satu bab baru dalam hidupmu.
Semoga setiap langkah yang kamu ambil membawa kedamaian,
kebahagiaan, dan pencapaian yang terus bertumbuh.
</div>
</div>
`;

}

});
</script>

</body>
</html>
